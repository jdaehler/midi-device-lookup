<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MIDI Device Lookup</title>
<meta name="description" content="Browse CC and NRPN parameters for 400+ hardware MIDI devices. No PDF manuals needed."/>
<style>
/* ── Themes ── */
:root[data-theme="dark"] {
  --bg:          #0d0d15;
  --bg-raised:   #111118;
  --bg-sunken:   #08080d;
  --border:      #252535;
  --border-mid:  #1e1e2e;
  --text:        #ccc;
  --text-bright: #e0e0e0;
  --text-dim:    #888;
  --text-faint:  #666;
  --accent:      hsl(300,100%,50%);
  --blue:        hsl(210,80%,65%);
  --mfr-bg:      hsl(220,30%,14%);
  --mfr-border:  hsl(220,25%,18%);
  --mfr-text:    #ffffff;
  --row-border:  #1a1a24;
  --row-hover:   #1e1e35;
  --sec-bg:      #0c0c18;
  --sec-text:    #7070b0;
  --thead-bg:    #161620;
  --thead-text:  #666;
  --td-border:   #191924;
  --td-hover:    #14141e;
  --input-bg:    #111118;
  --empty:       #252530;
  --green:       #4aba4a;
  --purple:      #7a6aef;
  --chip-bg:     #111118;
  --chip-border: #252535;
  --chip-text:   #555;
  --toggle-bg:   #1a1a22;
  --toggle-border: #252535;
  --toggle-text: #888;
  --footer-text: #444;
  --footer-link: #555;
  --toast-bg:    #1a2a1a;
  --toast-text:  #4aba4a;
  --toast-border:#2a4a2a;
}
:root[data-theme="light"] {
  --bg:          hsl(240,15%,97%);
  --bg-raised:   #ffffff;
  --bg-sunken:   hsl(240,15%,93%);
  --border:      hsl(240,10%,82%);
  --border-mid:  hsl(240,10%,88%);
  --text:        #1a1a2e;
  --text-bright: #111;
  --text-dim:    #777;
  --text-faint:  #aaa;
  --accent:      hsl(300,100%,35%);
  --blue:        hsl(210,80%,38%);
  --mfr-bg:      hsl(220,25%,91%);
  --mfr-border:  hsl(220,20%,84%);
  --mfr-text:    #1a1a2e;
  --row-border:  hsl(240,10%,90%);
  --row-hover:   hsl(240,20%,94%);
  --sec-bg:      hsl(240,15%,93%);
  --sec-text:    hsl(240,40%,45%);
  --thead-bg:    hsl(240,10%,96%);
  --thead-text:  #999;
  --td-border:   hsl(240,10%,91%);
  --td-hover:    hsl(240,15%,96%);
  --input-bg:    #ffffff;
  --empty:       #ccc;
  --green:       #2a8a2a;
  --purple:      #5a4adf;
  --chip-bg:     #ffffff;
  --chip-border: hsl(240,10%,82%);
  --chip-text:   #888;
  --toggle-bg:   #ffffff;
  --toggle-border: hsl(240,10%,82%);
  --toggle-text: #666;
  --footer-text: #aaa;
  --footer-link: #888;
  --toast-bg:    #e8f5e8;
  --toast-text:  #2a6a2a;
  --toast-border:#b0d8b0;
}

/* ── Reset ── */
* { box-sizing: border-box; margin: 0; padding: 0; }
.hidden { display: none !important; }
html { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg); color: var(--text); font-size: 15px;
  min-height: 100vh; display: flex; flex-direction: column;
  transition: background 0.15s, color 0.15s;
}

/* ── Layout ── */
.app { max-width: 1000px; width: 100%; margin: 0 auto; padding: 20px 16px; flex: 1; display: flex; flex-direction: column; gap: 10px; }

/* ── Header ── */
.header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.header-left { display: flex; flex-direction: column; gap: 2px; }
.title { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
.subtitle { font-size: 11px; color: var(--text-dim); }
.theme-btn {
  background: var(--toggle-bg); color: var(--toggle-text);
  border: 1px solid var(--toggle-border); border-radius: 6px;
  padding: 5px 10px; cursor: pointer; font-size: 14px; flex-shrink: 0;
  transition: background 0.15s;
}
.theme-btn:hover { color: var(--text); }

/* ── Search ── */
.search-bar { position: relative; }
.search-bar input {
  width: 100%; background: var(--input-bg); color: var(--text-bright);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 36px 10px 12px; font-size: 14px; outline: none;
  transition: border-color 0.15s;
}
.search-bar input:focus { border-color: var(--accent); }
.clear-btn {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--text-dim);
  font-size: 16px; padding: 2px 4px; display: none; line-height: 1;
}
.clear-btn:hover { color: var(--text); }

/* ── Chips ── */
.chips-bar { display: flex; gap: 5px; flex-wrap: wrap; min-height: 20px; }
.chip { background: var(--chip-bg); border: 1px solid var(--chip-border); border-radius: 10px; padding: 2px 10px; font-size: 13px; color: var(--chip-text); cursor: pointer; white-space: nowrap; }
.chip:hover { color: var(--accent); border-color: var(--accent); }

/* ── Status ── */
.status { font-size: 13px; color: var(--text-dim); min-height: 16px; }
.status.error { color: #e05555; }

/* ── Result list ── */
.result-list { border-top: 1px solid var(--border-mid); }
.result-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 4px; border-bottom: 1px solid var(--row-border); cursor: pointer;
}
.result-item:hover { background: var(--row-hover); }
.result-item .manufacturer { color: var(--blue); font-weight: 600; margin-right: 6px; }
.result-item .device { color: var(--text-bright); }
.result-item .count { display: flex; align-items: center; gap: 0; flex-shrink: 0; }
.result-item .col-nrpn { width: 52px; display: flex; justify-content: flex-end; }
.result-item .col-count { width: 84px; display: flex; justify-content: flex-end; }
.mfr-header { color: var(--blue); background: var(--mfr-bg); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; padding: 6px 8px; border-bottom: 1px solid var(--mfr-border); }
.badge-new { display: inline-block; font-size: 9px; font-weight: 700; color: var(--green); border: 1px solid; border-color: color-mix(in srgb, var(--green) 40%, transparent); border-radius: 3px; padding: 0 3px; margin-right: 5px; vertical-align: middle; }
.badge-nrpn { display: inline-block; font-size: 11px; font-weight: 700; color: var(--purple); border: 1px solid; border-color: color-mix(in srgb, var(--purple) 40%, transparent); border-radius: 3px; padding: 1px 5px; vertical-align: middle; }
.badge-count { display: inline-block; font-size: 11px; font-weight: 700; color: var(--green); border: 1px solid; border-color: color-mix(in srgb, var(--green) 40%, transparent); border-radius: 3px; padding: 1px 5px; vertical-align: middle; }
.fav-btn { background: none; border: none; cursor: pointer; font-size: 15px; color: var(--text-faint); width: 28px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; line-height: 1; transition: color 0.1s; }
.chip-nrpn { color: color-mix(in srgb, var(--purple) 70%, var(--text-faint)) !important; border-color: color-mix(in srgb, var(--purple) 30%, transparent) !important; }
.chip-nrpn:hover { color: var(--purple) !important; border-color: color-mix(in srgb, var(--purple) 60%, transparent) !important; }
.chip-nrpn.active { color: var(--purple) !important; border-color: var(--purple) !important; background: color-mix(in srgb, var(--purple) 12%, transparent) !important; font-weight: 700; }
.chip-fav { color: color-mix(in srgb, #e8a020 70%, var(--text-faint)) !important; border-color: color-mix(in srgb, #e8a020 30%, transparent) !important; }
.chip-fav:hover { color: #e8a020 !important; border-color: color-mix(in srgb, #e8a020 60%, transparent) !important; }
.chip-fav.active { color: #e8a020 !important; border-color: #e8a020 !important; background: color-mix(in srgb, #e8a020 12%, transparent) !important; font-weight: 700; }
.fav-btn:hover, .fav-btn.active { color: #e8a020; }

/* ── Device view ── */
.device-view { display: none; flex-direction: column; gap: 10px; }
.device-view.active { display: flex; }
.result-view.hidden { display: none; }

.device-header { display: flex; align-items: baseline; justify-content: space-between; padding-bottom: 8px; border-bottom: 1px solid var(--border-mid); flex-wrap: wrap; gap: 8px; }
.device-name { font-size: 20px; font-weight: 400; color: var(--text-bright); }
.device-manufacturer { font-size: 15px; color: var(--blue); margin-left: 10px; }
.device-actions { display: flex; gap: 6px; }

.back-btn, .copy-btn, .source-btn {
  background: var(--bg-raised); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 16px; cursor: pointer; font-size: 14px;
  transition: background 0.1s, border-color 0.1s;
  text-decoration: none; display: inline-block;
}
.back-btn:hover, .copy-btn:hover, .source-btn:hover { border-color: var(--blue); color: var(--text-bright); }
.copy-flash { color: var(--green) !important; border-color: color-mix(in srgb, var(--green) 40%, transparent) !important; }

.table-filter input {
  width: 100%; background: var(--input-bg); color: var(--text-bright);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 12px; font-size: 14px; outline: none;
  transition: border-color 0.15s;
}
.table-filter input:focus { border-color: var(--blue); }

.table-wrap { overflow-x: auto; border: 1px solid var(--border-mid); border-radius: 5px; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
thead th {
  position: sticky; top: 0; background: var(--blue);
  color: #fff; text-transform: uppercase; font-size: 13px; letter-spacing: 0.6px; font-weight: 700;
  text-align: left; padding: 7px 8px; border-bottom: 1px solid var(--border); white-space: nowrap;
}
tbody td { padding: 5px 8px; border-bottom: 1px solid var(--td-border); vertical-align: top; font-size: 13px; }
tbody tr:hover td { background: var(--td-hover); }
tbody tr { cursor: pointer; }
.sec-divider td { background: var(--mfr-bg); color: var(--blue); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; padding: 6px 8px; border-bottom: 1px solid var(--mfr-border); pointer-events: none; }
.col-param { color: var(--text-bright); font-weight: 400; }
.col-param .desc { display: block; color: var(--text-dim); font-weight: 400; font-size: 12px; margin-top: 1px; }
.col-cc { color: var(--blue); white-space: nowrap; font-family: monospace; }
.col-nrpn { color: var(--purple); white-space: nowrap; font-family: monospace; font-size: 12px; }
.col-range { color: var(--green); white-space: nowrap; font-size: 12px; }
.col-usage { color: var(--text); font-size: 13px; font-weight: 400; word-break: break-word; overflow-wrap: break-word; min-width: 160px; }
.col-notes { color: var(--text-dim); font-style: italic; font-size: 12px; word-break: break-word; overflow-wrap: break-word; }
.empty-cell { color: var(--empty); }
.row-count { color: var(--text-dim); font-size: 12px; }
.section-chips { display: flex; gap: 5px; flex-wrap: wrap; padding: 4px 0 2px; }
.chip-sec { background: var(--chip-bg); border: 1px solid var(--chip-border); border-radius: 10px; padding: 2px 10px; font-size: 12px; color: var(--chip-text); cursor: pointer; white-space: nowrap; }
.chip-sec:hover { color: var(--blue); border-color: var(--blue); }
.chip-sec.active { color: var(--blue); border-color: var(--blue); background: var(--mfr-bg); }

/* ── Export modal ── */
.export-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.export-modal {
  background: var(--bg-raised); border: 1px solid var(--border);
  border-radius: 10px; padding: 24px; width: 360px; max-width: 90vw;
  display: flex; flex-direction: column; gap: 16px;
}
.export-modal-title { font-size: 16px; font-weight: 700; color: var(--text-bright); }
.export-section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-faint); margin-bottom: -8px; }
.export-fmt-row { display: flex; gap: 8px; }
.export-fmt {
  flex: 1; padding: 8px; background: var(--bg-sunken); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-dim); cursor: pointer; font-size: 14px; font-weight: 600;
  transition: all 0.1s;
}
.export-fmt.active { background: color-mix(in srgb, var(--blue) 12%, transparent); border-color: var(--blue); color: var(--blue); }
.export-device-item {
  background: var(--bg-sunken); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px; font-size: 13px; color: var(--text);
}
.export-device-mfr { color: var(--blue); font-weight: 600; }
.export-devices-hint { font-size: 11px; color: var(--text-faint); }
.export-modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.export-cancel {
  background: var(--bg-sunken); color: var(--text-dim); border: 1px solid var(--border);
  border-radius: 6px; padding: 7px 16px; cursor: pointer; font-size: 14px;
}
.export-cancel:hover { color: var(--text); }
.export-download {
  background: var(--blue); color: #fff; border: none;
  border-radius: 6px; padding: 7px 20px; cursor: pointer; font-size: 14px; font-weight: 600;
}
.export-download:hover { opacity: 0.85; }

/* ── Toast ── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--toast-bg); color: var(--toast-text); border: 1px solid var(--toast-border); border-radius: 6px; padding: 6px 16px; font-size: 12px; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

/* ── Footer ── */
.page-footer { text-align: center; padding: 16px; font-size: 12px; color: var(--footer-text); border-top: 1px solid var(--border-mid); margin-top: auto; }
.page-footer a { color: var(--footer-link); text-decoration: none; }
.page-footer a:hover { color: var(--text); }
</style>
<script>
// Apply saved theme before render to avoid flash
(function() {
  var saved = localStorage.getItem("mdl-theme");
  var preferred = saved || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
  document.documentElement.setAttribute("data-theme", preferred);
})();
</script>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-left">
      <div class="title">MIDI DEVICE LOOKUP <span style="font-size:11px; font-weight:400; color:var(--text-dim); letter-spacing:0;">__VERSION__</span></div>
      <div class="subtitle">__SUBTITLE__</div>
    </div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
  </div>

  <div class="search-bar" id="search-bar">
    <input type="text" id="search-input" placeholder='Search manufacturer or device, e.g. "Moog Matriarch"…' autocomplete="off"/>
    <button class="clear-btn" id="clear-btn" onclick="clearSearch()" title="Clear">✕</button>
  </div>

  <div class="chips-bar" id="chips-bar"></div>
  <div class="status" id="status"></div>

  <div id="result-view" class="result-view">
    <div class="result-list" id="result-list"></div>
  </div>

  <div id="device-view" class="device-view">
    <div class="device-header">
      <div>
        <span class="device-name" id="device-name"></span>
        <span class="device-manufacturer" id="device-manufacturer"></span>
      </div>
      <div class="device-actions">
        <a class="source-btn" id="source-btn" target="_blank" rel="noopener">CSV ↗</a>
        <button class="copy-btn" id="copy-btn" onclick="copyTable()">Copy TSV</button>
        <button class="copy-btn" id="export-btn" onclick="showExport()">Export…</button>
        <button class="back-btn" id="back-btn">← Back</button>
      </div>
    </div>
    <div class="section-chips" id="section-chips"></div>
    <div class="table-filter">
      <input type="text" id="table-filter-input" placeholder="Filter by parameter name, CC number, notes…" autocomplete="off"/>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Parameter</th><th>CC</th><th>NRPN</th>
          <th>Range</th><th>Usage</th><th>Notes</th>
        </tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="row-count" id="row-count"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="export-overlay hidden" id="export-overlay">
  <div class="export-modal">
    <div class="export-modal-title">Export Parameters</div>
    <div class="export-section-label">Format</div>
    <div class="export-fmt-row">
      <button class="export-fmt active" data-fmt="csv" onclick="selectFmt(this)">CSV</button>
      <button class="export-fmt" data-fmt="json" onclick="selectFmt(this)">JSON</button>
    </div>
    <div class="export-section-label">Devices</div>
    <div class="export-device-item"><span class="export-device-mfr" id="export-device-mfr"></span> <span id="export-device-name"></span></div>
    <div class="export-devices-hint">Multi-device export coming soon</div>
    <div class="export-modal-footer">
      <button class="export-cancel" onclick="closeExport()">Cancel</button>
      <button class="export-download" onclick="doExport()">Download</button>
    </div>
  </div>
</div>

<div class="page-footer">
  Data: <a href="https://midi.guide" target="_blank">MIDI Guide</a> (CC-BY-SA 4.0) ·

  Made by <a href="https://youtube.com/@WireDrifter" target="_blank">ARPMAN / WireDrifter</a> ·
  MIDI Device Lookup __VERSION__
</div>

<script>
var F = {SEC:0,NAME:1,DESC:2,CMB:3,CLB:4,CMIN:5,CMAX:6,NMB:7,NLB:8,NMIN:9,NMAX:10,USE:11,NOT:12};
var DATA = __DEVICE_DATA__;
var NEW_KEYS = new Set([]);
var allDevices = [];
(DATA.manufacturers||[]).forEach(function(m) {
  (m.devices||[]).forEach(function(d) {
    allDevices.push({manufacturer:m.name, device:d.name, params:d.params||[], isNew:NEW_KEYS.has(m.name+"|"+d.name), hasNrpn:(d.params||[]).some(function(p){return p[F.NMB]&&p[F.NMB]!=="";})});
  });
});
var currentParams = [];
var currentDevice = null;
var currentSection = null;
var nrpnFilterActive = false;
var exportFormat = "csv";

var HIST_KEY = "mdl-history";
var searchHistory = [];
try { searchHistory = JSON.parse(localStorage.getItem(HIST_KEY)||"[]"); } catch(e) {}

var FAV_KEY = "mdl-favorites";
var favorites = [];
var favFilterActive = false;
try { favorites = JSON.parse(localStorage.getItem(FAV_KEY)||"[]"); } catch(e) {}

function favId(d) { return d.manufacturer + "|||" + d.device; }
function isFav(d) { return favorites.indexOf(favId(d)) !== -1; }
function toggleFav(d, e) {
  e.stopPropagation();
  var id = favId(d);
  var idx = favorites.indexOf(id);
  if (idx === -1) favorites.push(id); else favorites.splice(idx, 1);
  try { localStorage.setItem(FAV_KEY, JSON.stringify(favorites)); } catch(e2) {}
  renderChips();
  renderResults(document.getElementById("search-input").value);
}

function clearSearch() {
  var inp = document.getElementById("search-input");
  inp.value = "";
  document.getElementById("clear-btn").style.display = "none";
  renderResults("");
  inp.focus();
}

function toggleTheme() {
  var html = document.documentElement;
  var next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", next);
  localStorage.setItem("mdl-theme", next);
  document.getElementById("theme-btn").textContent = next === "dark" ? "🌙" : "☀️";
}

function saveHistory(q) {
  if (!q || q.trim().length < 2) return;
  searchHistory = [q].concat(searchHistory.filter(function(h){return h!==q;})).slice(0,8);
  try { localStorage.setItem(HIST_KEY, JSON.stringify(searchHistory)); } catch(e) {}
  renderChips();
}


function renderChips() {
  var bar = document.getElementById("chips-bar");
  if (!bar) return;
  bar.innerHTML = "";

  var fc = document.createElement("span");
  fc.className = "chip chip-fav" + (favFilterActive ? " active" : "");
  fc.textContent = "★" + (favorites.length > 0 ? " (" + favorites.length + ")" : "");
  fc.title = "Favorites";
  fc.addEventListener("click", function() {
    favFilterActive = !favFilterActive;
    fc.classList.toggle("active", favFilterActive);
    renderResults(document.getElementById("search-input").value);
  });
  bar.appendChild(fc);

  var nrpnCount = allDevices.filter(function(d){return d.hasNrpn;}).length;
  if (nrpnCount > 0) {
    var rc = document.createElement("span");
    rc.className = "chip chip-nrpn";
    rc.textContent = "NRPN (" + nrpnCount + ")";
    rc.classList.toggle("active", nrpnFilterActive);
    rc.addEventListener("click", function() {
      nrpnFilterActive = !nrpnFilterActive;
      rc.classList.toggle("active", nrpnFilterActive);
      renderResults(document.getElementById("search-input").value);
    });
    bar.appendChild(rc);
  }
  searchHistory.forEach(function(h) {
    var chip = document.createElement("span");
    chip.className = "chip";
    chip.textContent = h;
    chip.addEventListener("click", function() {
      var inp = document.getElementById("search-input");
      inp.value = h;
      document.getElementById("clear-btn").style.display = "block";
      renderResults(h);
      inp.focus();
    });
    bar.appendChild(chip);
  });
}

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fmtCell(s) {
  var h = esc(s);
  h = h.replace(/;\s*/g, ";<br>");
  if (/^\d+:/.test(s)) h = h.replace(/,\s*(\d+:)/g, ",<br>$1");
  h = h.replace(/([^\s<>])\.?(Bits?\s*\d)/g, "$1<br>$2");
  return h;
}
function setStatus(text, isError) {
  var el = document.getElementById("status");
  el.textContent = text||"";
  el.className = isError ? "status error" : "status";
}
function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 1500);
}

function renderResults(query) {
  var list = document.getElementById("result-list");
  list.innerHTML = "";

  var pool = nrpnFilterActive ? allDevices.filter(function(d){return d.hasNrpn;}) : allDevices;
  if (favFilterActive) pool = pool.filter(function(d){ return isFav(d); });

  function addFavBtn(item, d) {
    var btn = document.createElement("button");
    btn.className = "fav-btn" + (isFav(d) ? " active" : "");
    btn.title = isFav(d) ? "Remove from favorites" : "Add to favorites";
    btn.textContent = "★";
    btn.addEventListener("click", function(e) { toggleFav(d, e); });
    item.appendChild(btn);
  }

  if (!query) {
    if (favFilterActive && pool.length === 0) {
      setStatus("No favorites yet — click ★ on any device to add", false);
      return;
    }
    setStatus(pool.length+" device"+(pool.length!==1?"s":"")+(nrpnFilterActive?" with NRPN":"")+(favFilterActive?" · favorites":""), false);
    var lastMfr = null;
    pool.forEach(function(d) {
      if (d.manufacturer !== lastMfr) {
        lastMfr = d.manufacturer;
        var hdr = document.createElement("div");
        hdr.className = "mfr-header";
        hdr.textContent = d.manufacturer;
        list.appendChild(hdr);
      }
      var item = document.createElement("div");
      item.className = "result-item";
      item.innerHTML = '<span>'+(d.isNew?'<span class="badge-new">NEW</span>':'')+'<span class="device">'+esc(d.device)+'</span></span><span class="count"><span class="col-nrpn">'+(d.hasNrpn?'<span class="badge-nrpn">NRPN</span>':'')+'</span><span class="col-count"><span class="badge-count">'+d.params.length+' params</span></span></span>';
      item.addEventListener("click", function(){showDevice(d);});
      addFavBtn(item, d);
      list.appendChild(item);
    });
    return;
  }

  var terms = query.toLowerCase().split(/\s+/).filter(function(t){return t.length>0;});
  var matches = pool.filter(function(d) {
    var hay = (d.manufacturer+" "+d.device).toLowerCase();
    return terms.every(function(t){return hay.indexOf(t)!==-1;});
  });

  setStatus(matches.length ? matches.length+" result"+(matches.length!==1?"s":"") : "No results", !matches.length);
  if (!matches.length) {
    var tip = document.createElement("div");
    tip.style.cssText = "padding:12px 4px;font-size:12px;color:var(--text-faint)";
    tip.innerHTML = 'Device not listed? <a href="https://midi.guide" target="_blank" style="color:var(--blue);text-decoration:none">Contribute on midi.guide ↗</a>';
    list.appendChild(tip);
    return;
  }

  matches.slice(0,300).forEach(function(d) {
    var item = document.createElement("div");
    item.className = "result-item";
    item.innerHTML = '<span><span class="manufacturer">'+esc(d.manufacturer)+'</span><span class="device">'+esc(d.device)+'</span></span>'
      +'<span class="count"><span class="col-nrpn">'+(d.hasNrpn?'<span class="badge-nrpn">NRPN</span>':'')+'</span><span class="col-count"><span class="badge-count">'+d.params.length+' params</span></span></span>';
    item.addEventListener("click", function(){
      saveHistory(query);
      showDevice(d);
    });
    addFavBtn(item, d);
    list.appendChild(item);
  });
  if (matches.length > 300) {
    var more = document.createElement("div");
    more.style.cssText = "color:var(--text-faint);padding:8px 4px;font-size:11px";
    more.textContent = "… and "+(matches.length-300)+" more. Narrow your search.";
    list.appendChild(more);
  }
}

function showDevice(d) {
  currentParams = d.params;
  currentDevice = d;
  currentSection = null;
  document.getElementById("result-view").classList.add("hidden");
  document.getElementById("device-view").classList.add("active");
  document.getElementById("search-bar").classList.add("hidden");
  document.getElementById("chips-bar").classList.add("hidden");
  document.getElementById("status").classList.add("hidden");
  document.getElementById("device-name").textContent = d.device;
  document.getElementById("device-manufacturer").textContent = d.manufacturer;
  document.getElementById("source-btn").href =
    "https://github.com/pencilresearch/midi/blob/main/"+
    encodeURIComponent(d.manufacturer)+"/"+encodeURIComponent(d.device)+".csv";
  document.getElementById("table-filter-input").value = "";
  // Render section chips
  var secBar = document.getElementById("section-chips");
  secBar.innerHTML = "";
  var sections = [];
  currentParams.forEach(function(p){ if(p[F.SEC]&&sections.indexOf(p[F.SEC])===-1) sections.push(p[F.SEC]); });
  if (sections.length > 1) {
    sections.forEach(function(sec) {
      var c = document.createElement("span");
      c.className = "chip-sec";
      c.textContent = sec;
      c.addEventListener("click", function() {
        currentSection = currentSection === sec ? null : sec;
        secBar.querySelectorAll(".chip-sec").forEach(function(el){ el.classList.toggle("active", el.textContent === currentSection); });
        renderTable(document.getElementById("table-filter-input").value);
      });
      secBar.appendChild(c);
    });
  }
  renderTable("");
  document.getElementById("table-filter-input").focus();
  window.scrollTo(0,0);
}

function backToSearch() {
  document.getElementById("device-view").classList.remove("active");
  document.getElementById("result-view").classList.remove("hidden");
  document.getElementById("search-bar").classList.remove("hidden");
  document.getElementById("chips-bar").classList.remove("hidden");
  document.getElementById("status").classList.remove("hidden");
  var q = document.getElementById("search-input").value;
  renderResults(q);
  document.getElementById("search-input").focus();
}

function renderTable(filter) {
  var tbody = document.getElementById("table-body");
  tbody.innerHTML = "";
  var term = (filter||"").toLowerCase().trim();
  var rows = currentSection ? currentParams.filter(function(p){return p[F.SEC]===currentSection;}) : currentParams;
  if (term) {
    rows = rows.filter(function(p) {
      return (p[F.NAME]||"").toLowerCase().indexOf(term)!==-1
          || (p[F.DESC]||"").toLowerCase().indexOf(term)!==-1
          || (p[F.SEC]||"").toLowerCase().indexOf(term)!==-1
          || (p[F.USE]||"").toLowerCase().indexOf(term)!==-1
          || (p[F.NOT]||"").toLowerCase().indexOf(term)!==-1
          || (p[F.CMB]||"").indexOf(term)!==-1
          || (p[F.NMB]||"").indexOf(term)!==-1;
    });
  }
  var lastSec = null;
  rows.forEach(function(p) {
    var sec=p[F.SEC]||"", name=p[F.NAME]||"", desc=p[F.DESC]||"";
    var cmb=p[F.CMB]||"", clb=p[F.CLB]||"", cmin=p[F.CMIN]||"", cmax=p[F.CMAX]||"";
    var nmb=p[F.NMB]||"", nlb=p[F.NLB]||"", nmin=p[F.NMIN]||"", nmax=p[F.NMAX]||"";
    var use=p[F.USE]||"", not=p[F.NOT]||"";
    if (sec && sec !== lastSec) {
      lastSec = sec;
      var secTr = document.createElement("tr");
      secTr.className = "sec-divider";
      secTr.innerHTML = '<td colspan="6">'+esc(sec)+'</td>';
      tbody.appendChild(secTr);
    }
    var paramHtml = esc(name||"–");
    if (desc && desc !== name) paramHtml += '<span class="desc">'+esc(desc)+"</span>";
    var cc = cmb ? (clb ? cmb+"/"+clb : cmb) : "";
    var nrpn = nmb ? (nlb ? nmb+"."+nlb : nmb) : "";
    var range = cmb&&cmin&&cmax ? cmin+"–"+cmax : nmb&&nmin&&nmax ? nmin+"–"+nmax : "";
    var tr = document.createElement("tr");
    var copyVal = cc || nrpn;
    if (copyVal) tr.title = "Click to copy "+(cc?"CC":"NRPN")+" "+copyVal;
    tr.innerHTML =
      '<td class="col-param">'+paramHtml+"</td>"+
      '<td class="col-cc">'+(cc?esc(cc):'<span class="empty-cell">–</span>')+"</td>"+
      '<td class="col-nrpn">'+(nrpn?esc(nrpn):'<span class="empty-cell">–</span>')+"</td>"+
      '<td class="col-range">'+(range?esc(range):'<span class="empty-cell">–</span>')+"</td>"+
      '<td class="col-usage">'+(use?fmtCell(use):"")+"</td>"+
      '<td class="col-notes">'+(not?fmtCell(not):"")+"</td>";
    if (copyVal) {
      tr.addEventListener("click", function() {
        navigator.clipboard.writeText(copyVal).then(function() {
          showToast("Copied: "+copyVal);
        });
      });
    }
    tbody.appendChild(tr);
  });
  document.getElementById("row-count").textContent = rows.length+" of "+currentParams.length+" parameters";
}

function copyTable() {
  var btn = document.getElementById("copy-btn");
  var header = ["Parameter","Description","CC","NRPN","Range","Usage","Notes"].join("\t");
  var lines = currentParams.map(function(p) {
    var cc = (p[F.CMB]||"") + (p[F.CLB] ? "/"+p[F.CLB] : "");
    var nrpn = (p[F.NMB]||"") + (p[F.NLB] ? "."+p[F.NLB] : "");
    var range = p[F.CMB]&&p[F.CMIN]&&p[F.CMAX] ? p[F.CMIN]+"–"+p[F.CMAX]
              : p[F.NMB]&&p[F.NMIN]&&p[F.NMAX] ? p[F.NMIN]+"–"+p[F.NMAX] : "";
    return [p[F.NAME]||"",p[F.DESC]||"",cc,nrpn,range,p[F.USE]||"",p[F.NOT]||""].join("\t");
  });
  navigator.clipboard.writeText(header+"\n"+lines.join("\n")).then(function() {
    btn.textContent = "Copied!";
    btn.classList.add("copy-flash");
    setTimeout(function(){ btn.textContent = "Copy TSV"; btn.classList.remove("copy-flash"); }, 1500);
  });
}

function showExport() {
  document.getElementById("export-device-mfr").textContent = currentDevice.manufacturer;
  document.getElementById("export-device-name").textContent = currentDevice.device;
  document.getElementById("export-overlay").classList.remove("hidden");
}
function closeExport() {
  document.getElementById("export-overlay").classList.add("hidden");
}
function selectFmt(btn) {
  document.querySelectorAll(".export-fmt").forEach(function(b){ b.classList.remove("active"); });
  btn.classList.add("active");
  exportFormat = btn.getAttribute("data-fmt");
}
function doExport() {
  if (!currentDevice) return;
  if (exportFormat === "csv") exportCsv([currentDevice]);
  else exportJson([currentDevice]);
  closeExport();
}
function csvCell(v) {
  v = String(v == null ? "" : v);
  if (v.indexOf(",") !== -1 || v.indexOf('"') !== -1 || v.indexOf("\n") !== -1)
    return '"' + v.replace(/"/g, '""') + '"';
  return v;
}
function downloadFile(content, filename, type) {
  var blob = new Blob([content], { type: type });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}
function exportCsv(devices) {
  var lines = [["Manufacturer","Device","Section","Parameter","Description","CC","NRPN","Range Min","Range Max","Usage","Notes"].join(",")];
  devices.forEach(function(d) {
    d.params.forEach(function(p) {
      var cc = (p[F.CMB]||"") + (p[F.CLB] ? "/"+p[F.CLB] : "");
      var nrpn = (p[F.NMB]||"") + (p[F.NLB] ? "."+p[F.NLB] : "");
      var rmin = p[F.CMB]&&p[F.CMIN] ? p[F.CMIN] : p[F.NMB]&&p[F.NMIN] ? p[F.NMIN] : "";
      var rmax = p[F.CMB]&&p[F.CMAX] ? p[F.CMAX] : p[F.NMB]&&p[F.NMAX] ? p[F.NMAX] : "";
      lines.push([d.manufacturer, d.device, p[F.SEC]||"", p[F.NAME]||"", p[F.DESC]||"", cc, nrpn, rmin, rmax, p[F.USE]||"", p[F.NOT]||""].map(csvCell).join(","));
    });
  });
  var name = devices.length === 1 ? devices[0].device.replace(/[^a-z0-9]+/gi, "-").toLowerCase() : "midi-params";
  downloadFile(lines.join("\n"), name + ".csv", "text/csv");
}
function exportJson(devices) {
  var out = devices.map(function(d) {
    return {
      manufacturer: d.manufacturer,
      device: d.device,
      params: d.params.map(function(p) {
        var obj = { section: p[F.SEC]||"", name: p[F.NAME]||"" };
        if (p[F.DESC]) obj.description = p[F.DESC];
        if (p[F.CMB]) { obj.cc = p[F.CMB]; if (p[F.CLB]) obj.cc_lsb = p[F.CLB]; }
        if (p[F.NMB]) { obj.nrpn = p[F.NMB]; if (p[F.NLB]) obj.nrpn_lsb = p[F.NLB]; }
        var rmin = p[F.CMB]&&p[F.CMIN] ? p[F.CMIN] : p[F.NMB]&&p[F.NMIN] ? p[F.NMIN] : null;
        var rmax = p[F.CMB]&&p[F.CMAX] ? p[F.CMAX] : p[F.NMB]&&p[F.NMAX] ? p[F.NMAX] : null;
        if (rmin !== null) obj.range_min = rmin;
        if (rmax !== null) obj.range_max = rmax;
        if (p[F.USE]) obj.usage = p[F.USE];
        if (p[F.NOT]) obj.notes = p[F.NOT];
        return obj;
      })
    };
  });
  var name = devices.length === 1 ? devices[0].device.replace(/[^a-z0-9]+/gi, "-").toLowerCase() : "midi-params";
  downloadFile(JSON.stringify(out.length === 1 ? out[0] : out, null, 2), name + ".json", "application/json");
}

document.addEventListener("DOMContentLoaded", function() {
  var theme = document.documentElement.getAttribute("data-theme");
  document.getElementById("theme-btn").textContent = theme === "dark" ? "🌙" : "☀️";

  document.getElementById("search-input").addEventListener("input", function(e) {
    var val = e.target.value;
    document.getElementById("clear-btn").style.display = val ? "block" : "none";
    renderResults(val);
  });
  document.getElementById("table-filter-input").addEventListener("input", function(e) {
    renderTable(e.target.value);
  });
  document.getElementById("back-btn").addEventListener("click", backToSearch);
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
      if (!document.getElementById("export-overlay").classList.contains("hidden")) { closeExport(); return; }
      if (document.getElementById("device-view").classList.contains("active")) backToSearch();
    }
  });
  document.getElementById("export-overlay").addEventListener("click", function(e) {
    if (e.target === this) closeExport();
  });
  renderChips();
  renderResults("");
  document.getElementById("search-input").focus();
});
</script>
</body>
</html>
